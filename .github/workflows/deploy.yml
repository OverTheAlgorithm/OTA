name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build
        working-directory: server
        run: go build -o /dev/null ./...

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            set -e
            cd ~/OTA
            git pull origin main
            # Rebuild server and recreate any service whose compose config changed.
            # --build only affects services with a build: key (server).
            # Other services (redis, postgres, caddy, backup) get recreated only
            # if their compose definition changed; otherwise left untouched.
            sudo docker compose up --build -d
