services:
  postgres:
    image: postgres:16-alpine
    container_name: ota-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ota
      POSTGRES_PASSWORD: ota_dev_password
      POSTGRES_DB: ota
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    image: iron2ron/ota-server
    container_name: ota-server
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - ./server/.env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres

  caddy:
    image: caddy:2-alpine
    container_name: ota-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  pgdata:
  caddy_data:
  caddy_config:
