services:
  postgres:
    image: postgres:16-alpine
    container_name: ota-postgres
    restart: unless-stopped
    # Bound to loopback only: not internet-exposed, but reachable via SSH tunnel
    # (e.g. ssh -L 5433:localhost:5432 user@host) for DB clients like DBeaver.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ota
      POSTGRES_PASSWORD: ota_dev_password
      POSTGRES_DB: ota
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ota -d ota"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ota-server
    restart: unless-stopped
    expose:
      - "8080"
    env_file:
      - ./server/.env
    environment:
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: ota-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  pgdata:
  caddy_data:
  caddy_config:
