services:
  postgres:
    image: postgres:16-alpine
    container_name: ota-postgres
    restart: unless-stopped
    # Bound to loopback only: not internet-exposed, but reachable via SSH tunnel
    # (e.g. ssh -L 5433:localhost:5432 user@host) for DB clients like DBeaver.
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: ota
      POSTGRES_PASSWORD: ota_dev_password
      POSTGRES_DB: ota
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ota -d ota"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ota-redis
    restart: unless-stopped
    # Internal network only — not exposed to host.
    command: >
      redis-server --save 60 1 --loglevel warning
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD} ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: ota-server
    restart: unless-stopped
    stop_grace_period: 35s
    expose:
      - "8080"
    env_file:
      - ./server/.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - server_images:/app/data/images
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backup:
    image: postgres:16-alpine
    container_name: ota-backup
    restart: unless-stopped
    volumes:
      - ./backups:/backups
    environment:
      - PGHOST=postgres
      - PGUSER=${DB_USER:-ota}
      - PGPASSWORD=${DB_PASSWORD:-ota_dev_password}
      - PGDATABASE=${DB_NAME:-ota}
    entrypoint: /bin/sh
    command: >
      -c 'while true; do
        echo "[$(date)] Starting backup...";
        pg_dump -Fc > /backups/backup_$$(date +%Y%m%d_%H%M%S).dump &&
        echo "[$(date)] Backup complete." &&
        find /backups -name "*.dump" -mtime +7 -delete;
        sleep 86400;
      done'
    depends_on:
      postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    container_name: ota-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server

volumes:
  pgdata:
  redisdata:
  server_images:
  caddy_data:
  caddy_config:
