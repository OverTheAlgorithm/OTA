  # ── Email Verification ──────────────────────────────────────────────────────

  /email-verification/send-code:
    post:
      tags: [email-verification]
      summary: Send a 6-digit OTP to the given email address
      description: Rate-limited. Requires authentication.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Code sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid email format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /email-verification/verify-code:
    post:
      tags: [email-verification]
      summary: Verify the 6-digit OTP
      description: |
        Validates the code sent to the user's email. Marks the email as verified on success.
        Locked out after too many failed attempts (requires new code request).
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
                  description: 6-digit numeric OTP
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '400':
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Max attempts exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ── Withdrawal ──────────────────────────────────────────────────────────────

  /withdrawal/info:
    get:
