                      $ref: '#/components/schemas/WithdrawalDetail'
                  has_more:
                    type: boolean
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /withdrawal/{id}/cancel:
    post:
      tags: [withdrawal]
      summary: Cancel a pending withdrawal and restore coins
      description: Only the withdrawal owner can cancel. Only pending withdrawals can be cancelled.
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Withdrawal cancelled; coins restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: ok
        '400':
          description: Cannot cancel (not pending)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (not the owner)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

