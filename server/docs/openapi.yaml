                      min_withdrawal_amount:
                        type: integer
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /withdrawal/bank-account:
    get:
      tags: [withdrawal]
      summary: Get user's registered bank account
      description: Returns null data if no bank account is registered.
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: Bank account (null if not set)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/BankAccount'
                      - type: 'null'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [withdrawal]
      summary: Save (create or update) user's bank account
      description: Account number is encrypted with AES-256-GCM before storage.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bank_name, account_number, account_holder]
              properties:
                bank_name:
                  type: string
                account_number:
                  type: string
                account_holder:
                  type: string
      responses:
        '200':
          description: Bank account saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: ok
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /withdrawal/request:
    post:
      tags: [withdrawal]
      summary: Request a coin withdrawal
      description: |
        Atomically checks balance, deducts coins, and creates the withdrawal record
        in a single DB transaction (SELECT FOR UPDATE). Requires a registered bank account
        and a minimum amount.
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount]
              properties:
                amount:
                  type: integer
                  description: Coins to withdraw (must meet minimum withdrawal amount)
      responses:
        '200':
          description: Withdrawal created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Withdrawal'
        '400':
          description: No bank account, below minimum amount
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Insufficient balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /withdrawal/history:
    get:
      tags: [withdrawal]
      summary: Get user's withdrawal history with transitions
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 50
        - name: offset
          in: query
