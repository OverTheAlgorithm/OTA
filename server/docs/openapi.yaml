      responses:
        '200':
          description: Note updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: string
                    example: ok
        '400':
          description: Empty note
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Can only edit your own notes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/terms:
    get:
      tags: [admin]
      summary: List all terms (including inactive)
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        '200':
          description: All terms
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Term'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags: [admin]
      summary: Create a new term record
      description: |
        Title + version must be unique. Creating a new version of an existing term
        means creating a new record (immutable title/version pair).
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, url, version, active, required]
              properties:
                title:
                  type: string
                description:
                  type: string
                url:
                  type: string
                  format: uri
                version:
                  type: string
                active:
                  type: boolean
                required:
                  type: boolean
      responses:
        '201':
          description: Term created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Term'
        '400':
          description: Validation error or duplicate title+version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/terms/{id}/active:
    patch:
      tags: [admin]
      summary: Toggle active status of a term
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [active]
              properties:
                active:
                  type: boolean
      responses:
        '200':
          description: Active status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: ok
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/terms/{id}:
    patch:
      tags: [admin]
      summary: Update mutable fields of a term (url, description, required)
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, required]
              properties:
                url:
                  type: string
                  format: uri
                description:
                  type: string
                required:
                  type: boolean
      responses:
        '200':
          description: Term updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Term'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

security:
  - cookieAuth: []
